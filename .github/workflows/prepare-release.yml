name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release without the leading v, for example 0.1.1"
        required: true
        type: string
      branch:
        description: "Branch to update before tagging"
        required: true
        default: "main"
        type: string

permissions:
  contents: write

concurrency:
  group: prepare-release-${{ github.event.inputs.branch }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Validate version format
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must be plain semver without a leading v, for example 0.1.1"
            exit 1
          fi

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install bump-my-version
        shell: bash
        run: python -m pip install --disable-pip-version-check bump-my-version

      - name: Bump version strings
        shell: bash
        run: bump-my-version bump --new-version "${{ inputs.version }}"

      - name: Refresh Cargo.lock
        shell: bash
        run: cargo metadata --format-version 1 > /dev/null

      - name: Verify docs checks
        shell: bash
        run: bash scripts/check-docs.sh

      - name: Verify version matches Cargo.toml
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          CARGO_VERSION="$(grep '^version = ' Cargo.toml | head -1 | sed -E 's/version = \"([^\"]+)\"/\1/')"
          if [[ "${VERSION}" != "${CARGO_VERSION}" ]]; then
            echo "Prepared version (${VERSION}) does not match Cargo.toml version (${CARGO_VERSION})."
            exit 1
          fi

      - name: Ensure tag does not already exist
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${{ inputs.version }}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists."
            exit 1
          fi

      - name: Commit version bump
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock README.md docs/src/cli.md docs/src/troubleshooting.md .bumpversion.toml
          git commit -m "Release ${{ inputs.version }}"

      - name: Create release tag
        shell: bash
        run: git tag "v${{ inputs.version }}"

      - name: Push commit and tag
        shell: bash
        run: |
          set -euo pipefail
          git push origin "HEAD:${{ inputs.branch }}"
          git push origin "v${{ inputs.version }}"

name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release without the leading v, for example 0.1.1"
        required: true
        type: string
      branch:
        description: "Branch to update before tagging"
        required: true
        default: "main"
        type: string

permissions: read-all

concurrency:
  group: prepare-release-${{ github.event.inputs.branch }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate version format
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must be plain semver without a leading v, for example 0.1.1"
            exit 1
          fi

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.x"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable

      - name: Install bump-my-version
        shell: bash
        run: python -m pip install --disable-pip-version-check "bump-my-version==1.3.0"

      - name: Bump version strings
        shell: bash
        run: bump-my-version bump --new-version "${{ inputs.version }}"

      - name: Refresh Cargo.lock
        shell: bash
        run: cargo generate-lockfile

      - name: Verify docs checks
        shell: bash
        run: bash scripts/check-docs.sh

      - name: Stamp changelog
        shell: bash
        run: python3 scripts/stamp-changelog.py "${{ inputs.version }}"

      - name: Sync docs changelog
        shell: bash
        run: python3 scripts/sync-changelog.py

      - name: Publish versioned schema
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          DEST="docs/public/schemas/v${VERSION}"
          mkdir -p "${DEST}"
          cp docs/public/schemas/latest/schema.json "${DEST}/schema.json"

      - name: Verify version matches Cargo.toml
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          CARGO_VERSION="$(grep '^version = ' Cargo.toml | head -1 | sed -E 's/version = \"([^\"]+)\"/\1/')"
          if [[ "${VERSION}" != "${CARGO_VERSION}" ]]; then
            echo "Prepared version (${VERSION}) does not match Cargo.toml version (${CARGO_VERSION})."
            exit 1
          fi

      - name: Ensure tag does not already exist
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${{ inputs.version }}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists."
            exit 1
          fi

      - name: Commit version bump
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock README.md docs/src/content/docs/cli.md docs/src/content/docs/troubleshooting.md .bumpversion.toml CHANGELOG.md docs/src/content/docs/changelog.md "docs/public/schemas/v${{ inputs.version }}/schema.json"
          git commit -m "Release ${{ inputs.version }}"

      - name: Create release tag
        shell: bash
        run: git tag "v${{ inputs.version }}"

      - name: Push commit and tag
        shell: bash
        env:
          RELEASE_WORKFLOW_TOKEN: ${{ secrets.RELEASE_WORKFLOW_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${RELEASE_WORKFLOW_TOKEN}" ]]; then
            echo "RELEASE_WORKFLOW_TOKEN secret is not configured."
            exit 1
          fi
          git remote set-url origin "https://x-access-token:${RELEASE_WORKFLOW_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "HEAD:${{ inputs.branch }}"
          git push origin "v${{ inputs.version }}"

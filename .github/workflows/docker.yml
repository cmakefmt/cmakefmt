name: Docker Build

on:
  push:
    branches: [main]
    paths: ['src/**', 'Cargo.toml', 'Cargo.lock', 'Dockerfile']
  pull_request:
    paths: ['src/**', 'Cargo.toml', 'Cargo.lock', 'Dockerfile']

permissions: read-all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Build Docker image
        run: docker build -t cmakefmt-test .

      - name: Verify binary runs
        run: |
          docker run --rm cmakefmt-test --version
          docker run --rm cmakefmt-test --help

      - name: Format a CMake file
        run: |
          echo 'CMAKE_MINIMUM_REQUIRED(VERSION 3.20)' | \
            docker run --rm -i cmakefmt-test - | \
            grep -q 'cmake_minimum_required'

name: Coverage

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  coverage:
    name: coverage
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@184183c2401be73c3bf42c2e61268aa5855379c1  # v2.78.1
        with:
          tool: cargo-llvm-cov

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-bin: "false"

      - name: Run coverage
        run: |
          cargo llvm-cov clean --workspace
          cargo llvm-cov --workspace --all-targets --summary-only | tee coverage-summary.txt
          cargo llvm-cov report --html --output-dir target/llvm-cov/html

      - name: Publish job summary
        run: |
          {
            echo '## Coverage'
            echo
            echo '```text'
            cat coverage-summary.txt
            echo '```'
            echo
            echo 'HTML coverage report is attached as a workflow artifact.'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage summary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: coverage-summary
          path: coverage-summary.txt

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: coverage-html
          path: target/llvm-cov/html

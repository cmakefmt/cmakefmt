name: Coverage

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  coverage:
    name: coverage
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@0967b2b57a225496457784e67192d3e6e3054cf8  # cargo-llvm-cov

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run coverage
        run: |
          cargo llvm-cov clean --workspace
          cargo llvm-cov --workspace --all-targets --summary-only | tee coverage-summary.txt
          cargo llvm-cov report --html --output-dir target/llvm-cov/html

      - name: Publish job summary
        run: |
          {
            echo '## Coverage'
            echo
            echo '```text'
            cat coverage-summary.txt
            echo '```'
            echo
            echo 'HTML coverage report is attached as a workflow artifact.'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage summary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: coverage-summary
          path: coverage-summary.txt

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: coverage-html
          path: target/llvm-cov/html

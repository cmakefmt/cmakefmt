name: Python

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/python.yml"
      - "build.rs"
      - "Cargo.lock"
      - "Cargo.toml"
      - "pyproject.toml"
      - "python/**"
      - "src/**"
  pull_request:
    paths:
      - ".github/workflows/python.yml"
      - "build.rs"
      - "Cargo.lock"
      - "Cargo.toml"
      - "pyproject.toml"
      - "python/**"
      - "src/**"

concurrency:
  group: python-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  build-wheel:
    name: Build and test wheel (${{ matrix.os }} / ${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64 }
          - { os: ubuntu-24.04-arm, target: aarch64 }
          - { os: macos-15-intel, target: x86_64 }
          - { os: macos-latest, target: aarch64 }
          - { os: windows-latest, target: x64 }
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build release wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.target }}
          args: --release --out dist

      - name: Smoke-test binary
        shell: bash
        run: |
          pip install --no-index --find-links dist cmakefmt
          cmakefmt --version
          echo 'set(  FOO  bar )' | cmakefmt -

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: sdist
          args: --out dist

      - name: Smoke-test sdist install
        shell: bash
        run: |
          pip install dist/*.tar.gz
          cmakefmt --version
          echo 'set(  FOO  bar )' | cmakefmt -

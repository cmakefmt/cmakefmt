name: Python

on:
  push:
    branches: [main]
    paths: ["src/**", "Cargo.toml", "pyproject.toml"]
  pull_request:
    paths: ["src/**", "Cargo.toml", "pyproject.toml"]

concurrency:
  group: python-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  build-wheel:
    name: Build wheel (${{ matrix.os }} / ${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64 }
          - { os: ubuntu-latest, target: aarch64 }
          - { os: macos-15-intel, target: x86_64 }
          - { os: macos-latest, target: aarch64 }
          - { os: windows-latest, target: x64 }
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build release wheel
        uses: PyO3/maturin-action@3e2bdf6ba6453a61e649744019b8a2d906c7eb38 # v1.51.0
        with:
          target: ${{ matrix.target }}
          args: --release --out dist

      - name: Smoke-test binary
        if: matrix.target != 'aarch64'
        shell: bash
        run: |
          pip install --no-index --find-links dist cmakefmt
          cmakefmt --version
          echo 'set(  FOO  bar )' | cmakefmt -

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build sdist
        uses: PyO3/maturin-action@3e2bdf6ba6453a61e649744019b8a2d906c7eb38 # v1.51.0
        with:
          command: sdist
          args: --out dist

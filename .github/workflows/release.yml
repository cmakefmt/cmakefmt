name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to rehearse, for example main, a commit SHA, or a release branch"
        required: true
        default: "main"
        type: string

permissions: read-all

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-version:
    name: verify-version
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Verify version source
        shell: bash
        run: |
          set -euo pipefail
          CARGO_VERSION="$(grep '^version = ' Cargo.toml | head -1 | sed -E 's/version = "([^"]+)"/\1/')"
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${{ github.ref_name }}"
            TAG_VERSION="${TAG#v}"
            if [[ "${TAG_VERSION}" != "${CARGO_VERSION}" ]]; then
              echo "Tag version (${TAG_VERSION}) does not match Cargo.toml version (${CARGO_VERSION})."
              exit 1
            fi
          else
            echo "Dry run for ref ${{ inputs.ref }} using Cargo.toml version ${CARGO_VERSION}."
          fi

  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: verify-version
    permissions:
      id-token: write
      attestations: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - name: linux-aarch64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
          - name: linux-musl-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_ext: tar.gz
          - name: macos-x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          key: ${{ matrix.target }}
          save-if: false

      - name: Install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        shell: bash
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Smoke test release binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/cmakefmt"
          "${BIN}" --version
          "${BIN}" --help >/dev/null
          "${BIN}" --generate-completion bash >/dev/null
          "${BIN}" --generate-man-page >/dev/null
          printf '%s\n' 'project(foo  )' > /tmp/CMakeLists.txt
          "${BIN}" /tmp/CMakeLists.txt >/tmp/CMakeLists.formatted
          grep -Fxq 'project(foo)' /tmp/CMakeLists.formatted

      - name: Smoke test release binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Bin = "target/${{ matrix.target }}/release/cmakefmt.exe"
          & $Bin --version
          & $Bin --help | Out-Null
          & $Bin --generate-completion bash | Out-Null
          & $Bin --generate-man-page | Out-Null
          Set-Content -Path CMakeLists.txt -Value "project(foo  )`n"
          & $Bin CMakeLists.txt | Out-File -Encoding utf8 CMakeLists.formatted
          $Formatted = Get-Content -Raw CMakeLists.formatted
          if ($Formatted.TrimEnd("`r", "`n") -ne "project(foo)") {
            Write-Error "Unexpected formatted output: $Formatted"
            exit 1
          }

      - name: Compute release version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(grep '^version = ' Cargo.toml | head -1 | sed -E 's/version = "([^"]+)"/\1/')"
          fi
          echo "value=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Package release archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.value }}"
          STAGE="cmakefmt-${VERSION}-${{ matrix.target }}"
          mkdir -p "${STAGE}"
          cp "target/${{ matrix.target }}/release/cmakefmt" "${STAGE}/"
          cp README.md "${STAGE}/"
          cp LICENSE "${STAGE}/"
          cp -r LICENSES "${STAGE}/"
          "target/${{ matrix.target }}/release/cmakefmt" --generate-completion bash > "${STAGE}/cmakefmt.bash"
          "target/${{ matrix.target }}/release/cmakefmt" --generate-completion zsh > "${STAGE}/_cmakefmt"
          "target/${{ matrix.target }}/release/cmakefmt" --generate-completion fish > "${STAGE}/cmakefmt.fish"
          "target/${{ matrix.target }}/release/cmakefmt" --generate-man-page > "${STAGE}/cmakefmt.1"
          tar -czf "${STAGE}.tar.gz" "${STAGE}"

      - name: Package release archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Version = "${{ steps.version.outputs.value }}"
          $Stage = "cmakefmt-$Version-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $Stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/cmakefmt.exe" "$Stage/cmakefmt.exe"
          Copy-Item "README.md" "$Stage/README.md"
          Copy-Item "LICENSE" "$Stage/LICENSE"
          Copy-Item "LICENSES" "$Stage/LICENSES" -Recurse
          & "target/${{ matrix.target }}/release/cmakefmt.exe" --generate-completion bash | Out-File -Encoding utf8 "$Stage/cmakefmt.bash"
          & "target/${{ matrix.target }}/release/cmakefmt.exe" --generate-completion zsh | Out-File -Encoding utf8 "$Stage/_cmakefmt"
          & "target/${{ matrix.target }}/release/cmakefmt.exe" --generate-completion fish | Out-File -Encoding utf8 "$Stage/cmakefmt.fish"
          & "target/${{ matrix.target }}/release/cmakefmt.exe" --generate-man-page | Out-File -Encoding utf8 "$Stage/cmakefmt.1"
          Compress-Archive -Path $Stage -DestinationPath "$Stage.zip"

      - name: Install cosign
        if: ${{ github.event_name == 'push' && github.ref_type == 'tag' }}
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4.1.1

      - name: Sign release archive with cosign
        if: ${{ github.event_name == 'push' && github.ref_type == 'tag' }}
        shell: bash
        run: |
          cosign sign-blob --yes \
            --bundle "cmakefmt-${{ steps.version.outputs.value }}-${{ matrix.target }}.${{ matrix.archive_ext }}.sigstore" \
            "cmakefmt-${{ steps.version.outputs.value }}-${{ matrix.target }}.${{ matrix.archive_ext }}"

      - name: Attest release archive
        if: ${{ github.event_name == 'push' && github.ref_type == 'tag' }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4
        with:
          subject-path: cmakefmt-${{ steps.version.outputs.value }}-${{ matrix.target }}.${{ matrix.archive_ext }}

      - name: Upload release artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: release-${{ steps.version.outputs.value }}-${{ matrix.target }}
          path: cmakefmt-${{ steps.version.outputs.value }}-${{ matrix.target }}.${{ matrix.archive_ext }}*

  test:
    name: test
    runs-on: ubuntu-latest
    needs: [verify-version, build]
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Run tests
        run: cargo test --locked

  publish:
    name: publish
    runs-on: ubuntu-latest
    needs: [verify-version, build, test]
    permissions:
      contents: write
    if: ${{ github.event_name == 'push' && github.ref_type == 'tag' }}
    environment: publish-crate
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.ref }}

      - name: Download packaged artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum * > SHA256SUMS

      - name: Generate Homebrew formula
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          SOURCE_URL="https://github.com/cmakefmt/cmakefmt/archive/refs/tags/v${VERSION}.tar.gz"
          curl -L --fail --silent --show-error "${SOURCE_URL}" -o /tmp/cmakefmt-source.tar.gz
          SOURCE_SHA256="$(sha256sum /tmp/cmakefmt-source.tar.gz | awk '{print $1}')"
          bash scripts/render-homebrew-formula.sh "${VERSION}" "${SOURCE_SHA256}" > dist/cmakefmt.rb

      - name: Publish GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2.6.1
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/*

  publish-crates-io:
    name: publish-crates-io
    runs-on: ubuntu-latest
    needs: [verify-version, build, test]
    if: ${{ github.event_name == 'push' && github.ref_type == 'tag' }}
    environment: publish-crate
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Publish crate to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_API_TOKEN }}

  publish-homebrew-tap:
    name: publish-homebrew-tap
    runs-on: ubuntu-latest
    needs: [verify-version, build, test, publish]
    if: ${{ github.event_name == 'push' && github.ref_type == 'tag' }}
    steps:
      - name: Download Homebrew formula from GitHub release
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          curl -L --fail --silent --show-error \
            "https://github.com/cmakefmt/cmakefmt/releases/download/v${VERSION}/cmakefmt.rb" \
            -o /tmp/cmakefmt.rb

      - name: Check out Homebrew tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: cmakefmt/homebrew-cmakefmt
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
          persist-credentials: false

      - name: Update Homebrew formula
        shell: bash
        run: |
          set -euo pipefail
          cp /tmp/cmakefmt.rb homebrew-tap/Formula/cmakefmt.rb

      - name: Commit and push Homebrew tap update
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${HOMEBREW_TAP_TOKEN}" ]]; then
            echo "HOMEBREW_TAP_TOKEN secret is not configured."
            exit 1
          fi
          cd homebrew-tap
          if git diff --quiet -- Formula/cmakefmt.rb; then
            echo "Homebrew formula already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/cmakefmt.rb
          git commit -m "Update cmakefmt formula for ${GITHUB_REF_NAME}"
          git remote set-url origin "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/cmakefmt/homebrew-cmakefmt.git"
          git push origin HEAD:main
          git tag "${GITHUB_REF_NAME}"
          git push origin "${GITHUB_REF_NAME}"

  publish-crates-io-dry-run:
    name: publish-crates-io-dry-run
    runs-on: ubuntu-latest
    needs: [verify-version, build, test]
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Dry-run crate publish
        run: cargo publish --locked --dry-run

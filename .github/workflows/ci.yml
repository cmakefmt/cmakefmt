name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  rust:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-bin: "false"

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Build API docs
        run: cargo doc --no-deps

      - name: Install cargo-audit
        if: matrix.os == 'ubuntu-latest'
        uses: taiki-e/install-action@184183c2401be73c3bf42c2e61268aa5855379c1  # v2.78.1
        with:
          tool: cargo-audit

      - name: Security audit
        if: matrix.os == 'ubuntu-latest'
        run: cargo audit

      - name: Install cargo-deny
        if: matrix.os == 'ubuntu-latest'
        uses: taiki-e/install-action@184183c2401be73c3bf42c2e61268aa5855379c1  # v2.78.1
        with:
          tool: cargo-deny

      - name: Dependency licences, bans, and advisories
        if: matrix.os == 'ubuntu-latest'
        run: cargo deny check

      - name: Check JSON schema is up to date
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo run --quiet -- config schema > /tmp/schema.json
          diff docs/public/schemas/latest/schema.json /tmp/schema.json || \
            (echo "Schema is out of date — run 'cmakefmt config schema' and commit the result" && exit 1)

  msrv:
    name: msrv (1.85)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain (MSRV)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable action, pinned toolchain below
        with:
          toolchain: "1.85"

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-bin: "false"
          # Use a separate cache key from the stable-toolchain rust job so
          # they don't fight over the same target/ directory contents.
          key: msrv

      - name: Check at MSRV
        # `cargo check` (not `cargo build`/`cargo test`) is sufficient: we
        # only need to confirm the source still type-checks at the floor
        # declared in `Cargo.toml`'s `rust-version`. The stable-toolchain
        # job above already exercises the full build+test path.
        run: cargo check --locked --all-features --all-targets

  sarif:
    name: sarif
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable
          components: clippy

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          save-if: false
          cache-bin: "false"

      - name: Install clippy-sarif and sarif-fmt
        uses: taiki-e/install-action@184183c2401be73c3bf42c2e61268aa5855379c1  # v2.78.1
        with:
          tool: clippy-sarif,sarif-fmt

      - name: Run Clippy and emit SARIF
        shell: bash
        run: |
          cargo clippy --all-targets --message-format=json \
            | clippy-sarif \
            | tee clippy.sarif \
            | sarif-fmt
        continue-on-error: true

      - name: Upload Clippy SARIF to code scanning
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        with:
          sarif_file: clippy.sarif

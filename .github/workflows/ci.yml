name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  rust:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Build API docs
        if: matrix.os == 'ubuntu-latest'
        run: cargo doc --no-deps

      - name: Install cargo-audit
        if: matrix.os == 'ubuntu-latest'
        uses: taiki-e/install-action@76bf6d08592ed7dfa264dc3fd083ede228bbb8c2  # cargo-audit

      - name: Security audit
        if: matrix.os == 'ubuntu-latest'
        run: cargo audit

      - name: Install cargo-deny
        if: matrix.os == 'ubuntu-latest'
        uses: taiki-e/install-action@a3d6a13b75a275d9e17d817beabc60eda99da897  # cargo-deny

      - name: Dependency licences, bans, and advisories
        if: matrix.os == 'ubuntu-latest'
        run: cargo deny check

      - name: Check JSON schema is up to date
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo run --quiet -- config schema > /tmp/schema.json
          diff docs/public/schemas/latest/schema.json /tmp/schema.json || \
            (echo "Schema is out of date — run 'cmakefmt config schema' and commit the result" && exit 1)

  sarif:
    name: sarif
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable
          components: clippy

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          save-if: false

      - name: Install clippy-sarif and sarif-fmt
        uses: taiki-e/install-action@76bf6d08592ed7dfa264dc3fd083ede228bbb8c2  # v2
        with:
          tool: clippy-sarif,sarif-fmt

      - name: Run Clippy and emit SARIF
        shell: bash
        run: |
          cargo clippy --all-targets --message-format=json \
            | clippy-sarif \
            | tee clippy.sarif \
            | sarif-fmt
        continue-on-error: true

      - name: Upload Clippy SARIF to code scanning
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13  # v4
        with:
          sarif_file: clippy.sarif

name: Cross-Platform Output Consistency

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/cross-platform.yml'
      - 'build.rs'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'src/**'
      - 'tests/fixtures/**'
  pull_request:
    paths:
      - '.github/workflows/cross-platform.yml'
      - 'build.rs'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'src/**'
      - 'tests/fixtures/**'

permissions: read-all

jobs:
  format-output:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable

      - name: Prepend Cargo bin to PATH
        shell: bash
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build
        run: cargo build --release

      - name: Format fixtures and capture output
        shell: bash
        run: |
          for f in tests/fixtures/**/*.cmake tests/fixtures/**/*.txt; do
            [ -f "$f" ] || continue
            ./target/release/cmakefmt "$f" 2>/dev/null || true
          done > cross-platform-output.txt

      - name: Upload output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: output-${{ matrix.os }}
          path: cross-platform-output.txt

  compare:
    needs: format-output
    runs-on: ubuntu-latest
    steps:
      - name: Download all outputs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1

      - name: Compare outputs
        run: |
          diff output-ubuntu-latest/cross-platform-output.txt \
               output-macos-latest/cross-platform-output.txt \
            || { echo "::error::Linux and macOS outputs differ"; exit 1; }
          diff output-ubuntu-latest/cross-platform-output.txt \
               output-windows-latest/cross-platform-output.txt \
            || { echo "::error::Linux and Windows outputs differ"; exit 1; }
          echo "All platforms produce identical output"

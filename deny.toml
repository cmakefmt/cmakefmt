# cargo-deny configuration.
# Run locally: cargo deny check

[graph]
# Evaluate against the stable toolchain target set.
targets = []

# ---------------------------------------------------------------------------
# Advisories — known vulnerabilities and unmaintained crates
# ---------------------------------------------------------------------------
[advisories]
# Warn on unmaintained crates; promote to deny once the dependency tree is
# stable and any known unmaintained crates are reviewed.
unmaintained = "all"
yanked = "deny"

# ---------------------------------------------------------------------------
# Licenses — only permissive licences are acceptable
# ---------------------------------------------------------------------------
[licenses]
# Deny any dependency whose licence is not in this allow-list.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "BSL-1.0",
  "LGPL-2.1-or-later",
  "Unlicense",
  "CC0-1.0",
]
# Confidence threshold for licence text detection (0.0–1.0).
confidence-threshold = 0.8

# ---------------------------------------------------------------------------
# Bans — duplicate dependencies and explicitly forbidden crates
# ---------------------------------------------------------------------------
[bans]
# Deny multiple versions of the same crate in the dependency graph.
# Known-acceptable transitive duplicates are listed in `skip` below so
# a new duplicate (which would usually mean a Cargo.toml mistake or an
# avoidable dep bump) fails CI instead of being silently warned about.
multiple-versions = "deny"
# Deny wildcard dependencies.
wildcards = "deny"

# Allowlist of crates whose duplicates we accept because they come in
# via transitive dependencies we don't control. Each entry should be
# revisited periodically — if the ecosystem converges, we should
# drop the entry so future duplications go back to failing.
skip = [
  # `bitflags` v1 / v2 split: many crates have migrated to v2 but a
  # long tail (notably some `windows-*` and `regex-*` transitives)
  # still pull v1. Tracked upstream; nothing we can fix here.
  { name = "bitflags" },
  # `windows-sys` v0.5x / v0.6x split: `tempfile`, `notify*`, and
  # `criterion` are typically on different majors than `clap`. Will
  # converge as the ecosystem catches up.
  { name = "windows-sys" },
  # `wit-bindgen` v0.51 / v0.57 split: `getrandom` v0.3 vs v0.4
  # pull `wasip2` and `wasip3` respectively, which in turn pull
  # different `wit-bindgen` majors. This is a WASI ecosystem split,
  # not something a single crate can resolve.
  { name = "wit-bindgen" },
]

# ---------------------------------------------------------------------------
# Sources — only crates.io and this repository
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

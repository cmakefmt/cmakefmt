[book]
authors = ["OpenAI Codex", "Project Contributors"]
language = "en"
src = "src"
title = "cmakefmt: Fast CMake Formatting"
description = "Installation guide, workflow-focused CLI reference, config guide, migration notes, API examples, and architecture notes for cmakefmt."

[build]
build-dir = "book"
create-missing = false

[output.html]
default-theme = "light"
preferred-dark-theme = "light"
site-url = "/"

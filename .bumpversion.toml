[tool.bumpversion]
current_version = "1.1.0"
parse = "(?P<major>\\d+)\\.(?P<minor>\\d+)\\.(?P<patch>\\d+)"
serialize = ["{major}.{minor}.{patch}"]
search = "{current_version}"
replace = "{new_version}"
regex = false
ignore_missing_version = false
tag = false
sign_tags = false
tag_name = "v{new_version}"
tag_message = "Release {new_version}"
allow_dirty = false
commit = false
message = "Release {new_version}"
commit_args = ""

[[tool.bumpversion.files]]
filename = "Cargo.toml"
search = """name = "cmakefmt-rust"
version = "{current_version}\""""
replace = """name = "cmakefmt-rust"
version = "{new_version}\""""

[[tool.bumpversion.files]]
filename = "README.md"

[[tool.bumpversion.files]]
filename = "docs/src/content/docs/cli.md"

[[tool.bumpversion.files]]
filename = "docs/src/content/docs/troubleshooting.md"

version = 1

[[annotations]]
path = [
  ".github/workflows/*.yml",
  ".gitignore",
  ".pre-commit-config.yaml",
  "AGENTS.md",
  "CHANGELOG.md",
  "CLAUDE.md",
  "CONTRIBUTING.md",
  "Cargo.lock",
  "Cargo.toml",
  "LICENSE",
  "README.md",
  "assets/logo.png",
  "docs/*.md",
  "scripts/*.py",
  "scripts/*.sh",
  "site/README.md",
  "site/book.toml",
  "site/src/*.md",
  "src/parser/cmake.pest",
  "tests/README.md",
  "tests/fixtures/README.md",
  "tests/fixtures/basic/*.cmake",
  "tests/fixtures/comments/*.cmake",
  "tests/fixtures/edge_cases/*.cmake",
  "tests/fixtures/real_world/manifest.toml",
  "tests/fixtures/real_world/SOURCES.md",
  "tests/fixtures/real_world/monorepo_root.cmake",
  "tests/snapshots/README.md",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "Copyright 2026 Puneet Matharu"
SPDX-License-Identifier = "MIT OR Apache-2.0"

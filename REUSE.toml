  "docs/logo.png",
  "docs/astro.config.mjs",
  "docs/package-lock.json",
  "docs/package.json",
  "docs/public/*.png",
  "docs/public/*.txt",
  "docs/public/schemas/**",
  "docs/src/assets/*.png",
  "docs/src/content.config.ts",
  "docs/src/content/docs/*.md",
  "docs/src/content/docs/*.mdx",

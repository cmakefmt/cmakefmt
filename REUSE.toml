version = 1

[[annotations]]
path = [
  ".github/workflows/*.yml",
  ".gitignore",
  ".pre-commit-config.yaml",
  "AGENTS.md",
  "CHANGELOG.md",
  "CLAUDE.md",
  "CONTRIBUTING.md",
  "Cargo.lock",
  "Cargo.toml",
  "LICENSE",
  "README.md",
  "docs/*.md",
  "site/README.md",
  "site/book.toml",
  "site/src/*.md",
  "src/parser/cmake.pest",
  "tests/README.md",
  "tests/fixtures/README.md",
  "tests/fixtures/basic/*.cmake",
  "tests/fixtures/comments/*.cmake",
  "tests/fixtures/edge_cases/*.cmake",
  "tests/fixtures/real_world/SOURCES.md",
  "tests/fixtures/real_world/monorepo_root.cmake",
  "tests/snapshots/README.md",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Puneet Matharu"
SPDX-License-Identifier = "MIT OR Apache-2.0"

[[annotations]]
path = [
  "tests/fixtures/real_world/abseil/CMakeLists.txt",
  "tests/snapshots/real_world__abseil__CMakeLists_txt.snap",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2017 The Abseil Authors"
SPDX-License-Identifier = "Apache-2.0"


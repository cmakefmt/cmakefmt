#
# Built-in CMake command spec. Parsed once at startup via
# CommandRegistry::builtins(). Users extend or override entries in their
# own .cmakefmt.yaml under `commands:` — the merge preserves order.

metadata:
  cmake_version: 4.3.1
  audited_at: "2026-04-02"
  notes: Built-in command spec audited against CMake 4.3.1 documentation and
    release notes.
commands:
  cmake_minimum_required:
    pargs: 0
    flags:
      - FATAL_ERROR
    kwargs:
      VERSION:
        nargs: 1
  project:
    pargs: 1
    flags:
      - VERSION
      - COMPAT_VERSION
      - SPDX_LICENSE
      - DESCRIPTION
      - HOMEPAGE_URL
      - LANGUAGES
  set:
    pargs: "2+"
    flags:
      - PARENT_SCOPE
    layout:
      wrap_after_first_arg: true
    kwargs:
      CACHE:
        nargs: 2
        flags:
          - FORCE
  unset:
    pargs: 1
    flags:
      - CACHE
      - PARENT_SCOPE
  message:
    pargs: "1+"
    flags:
      - STATUS
      - WARNING
      - AUTHOR_WARNING
      - SEND_ERROR
      - FATAL_ERROR
      - DEPRECATION
      - NOTICE
      - VERBOSE
      - DEBUG
      - TRACE
      - CHECK_START
      - CHECK_PASS
      - CHECK_FAIL
  option:
    pargs: "2+"
  include_guard:
    pargs: "?"
    flags:
      - DIRECTORY
      - GLOBAL
  include:
    pargs: 1
    flags:
      - OPTIONAL
      - RESULT_VARIABLE
      - NO_POLICY_SCOPE
  add_subdirectory:
    pargs: "1+"
    flags:
      - EXCLUDE_FROM_ALL
      - SYSTEM
  configure_file:
    pargs: 2
    flags:
      - COPYONLY
      - ESCAPE_QUOTES
      - "@ONLY"
    kwargs:
      NEWLINE_STYLE:
        nargs: 1
  add_executable:
    pargs: "2+"
    flags:
      - WIN32
      - MACOSX_BUNDLE
      - EXCLUDE_FROM_ALL
      - IMPORTED
      - ALIAS
  add_library:
    pargs: "2+"
    flags:
      - STATIC
      - SHARED
      - MODULE
      - OBJECT
      - INTERFACE
      - UNKNOWN
      - IMPORTED
      - ALIAS
      - EXCLUDE_FROM_ALL
  add_custom_target:
    pargs: "1+"
    flags:
      - ALL
      - VERBATIM
      - USES_TERMINAL
      - COMMAND_EXPAND_LISTS
    kwargs:
      BYPRODUCTS:
        nargs: "*"
      COMMAND:
        nargs: "+"
      COMMENT:
        nargs: 1
      DEPENDS:
        nargs: "*"
      JOB_POOL:
        nargs: 1
      SOURCES:
        nargs: "*"
      WORKING_DIRECTORY:
        nargs: 1
  add_custom_command:
    pargs: "*"

[package]
name = "cmfmt"
version = "0.1.0"
edition = "2021"
description = "A fast, correct CMake formatter"
license = "MIT"

[[bin]]
name = "cmfmt"
path = "src/main.rs"

[lib]
name = "cmfmt"
path = "src/lib.rs"

[dependencies]
pest        = "2"
pest_derive = "2"
pretty      = "0.12"
clap        = { version = "4", features = ["derive"] }
serde       = { version = "1", features = ["derive"] }
toml        = "0.8"
thiserror   = "1"
indexmap    = { version = "2", features = ["serde"] }
walkdir     = "2"

[dev-dependencies]
insta     = "1"
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "formatter"
harness = false
